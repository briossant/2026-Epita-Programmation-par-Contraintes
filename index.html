<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Drone VRP Visualizer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e1e; color: white; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #2d2d2d; border: 2px solid #444; margin-top: 20px; cursor: crosshair; }
        .controls { background: #333; padding: 20px; border-radius: 8px; margin-top: 20px; width: 800px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #0078d4; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #005a9e; }
        .legend { margin-top: 10px; display: flex; gap: 20px; }
        .item { display: flex; align-items: center; gap: 5px; }
        .box { width: 15px; height: 15px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Drone Delivery Routing - Visualizer</h1>
    
    <canvas id="map" width="800" height="600"></canvas>

    <div class="legend">
        <div class="item"><div class="box" style="background: red;"></div> Dépôt</div>
        <div class="item"><div class="box" style="background: #0078d4;"></div> Clients</div>
        <div class="item"><div class="box" style="background: rgba(255,0,0,0.3);"></div> Zone NOTAM</div>
    </div>

    <div class="controls">
        <button onclick="solve()">Lancer l'Optimisation</button>
        <div id="status">Statut: Prêt</div>
    </div>

    <script>
        const canvas = document.getElementById('map');
        const ctx = canvas.getContext('2d');
        const SCALE = 6;
        const OFFSET_X = 50;
        const OFFSET_Y = 50;

        let missionData = {
            depot: [50, 50, 0],
            clients: [[10, 10, 10], [10, 90, 10], [80, 50, 10], [90, 90, 10], [80, 10, 10], [20, 80, 10]],
            demands: [5, 5, 5, 5, 5, 5],
            notam_zones: [ [ [15, 10], [15, 55], [30, 55], [30, 10] ], [ [35, 0], [35, 40], [65, 40], [65, 0] ], [ [45, 60], [45, 100], [55, 100], [55, 60] ]],
            num_drones: 3,
            battery_capacity: 2000,
            max_load: 15
        };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw NOTAM Zones
            ctx.fillStyle = 'rgba(255, 0, 0, 0.2)';
            ctx.strokeStyle = 'red';
            missionData.notam_zones.forEach(zone => {
                ctx.beginPath();
                zone.forEach((p, i) => {
                    const x = p[0] * SCALE + OFFSET_X;
                    const y = p[1] * SCALE + OFFSET_Y;
                    if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                });
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            });

            // Draw Clients
            ctx.fillStyle = '#0078d4';
            missionData.clients.forEach(c => {
                ctx.beginPath();
                ctx.arc(c[0] * SCALE + OFFSET_X, c[1] * SCALE + OFFSET_Y, 5, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Depot
            ctx.fillStyle = 'red';
            ctx.fillRect(missionData.depot[0] * SCALE + OFFSET_X - 7, missionData.depot[1] * SCALE + OFFSET_Y - 7, 14, 14);
        }

        async function solve() {
            document.getElementById('status').innerText = "Statut: Calcul en cours...";
            try {
                const res = await fetch('http://localhost:8000/solve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(missionData)
                });
                const data = await res.json();
                
                if(data.status === "success") {
                    document.getElementById('status').innerText = "Statut: Solution trouvée !";
                    draw();
                    drawRoutes(data.routes);
                } else {
                    document.getElementById('status').innerText = "Statut: Échec du calcul.";
                }
            } catch (e) {
                document.getElementById('status').innerText = "Statut: API non joignable (Lancez app.py)";
            }
        }

        function drawRoutes(routes) {
            const colors = ['#00ff00', '#ff00ff', '#00ffff', '#ffff00'];
            routes.forEach((r, idx) => {
                ctx.strokeStyle = colors[idx % colors.length];
                ctx.lineWidth = 3;
                ctx.setLineDash([5, 5]); // Pointillés pour le vol
                ctx.beginPath();
                r.geometry.forEach((p, i) => {
                    const x = p[0] * SCALE + OFFSET_X;
                    const y = p[1] * SCALE + OFFSET_Y;
                    if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                });
                ctx.stroke();
            });
            ctx.setLineDash([]);
        }

        draw();
    </script>
</body>
</html>
